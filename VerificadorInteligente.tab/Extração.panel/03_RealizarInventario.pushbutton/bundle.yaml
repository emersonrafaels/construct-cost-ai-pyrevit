title: Inventário
author: Emerson Rafael
tooltip: |
  Inventário completo por ambiente para agência bancária.

  Associa cada equipamento ao seu Room/Space e agrupa por:
  Ambiente → Categoria → Família / Tipo → Quantidade

  Detecta sistemas críticos: CFTV, Controle de Acesso, UPS,
  SPDA, Sprinkler, Rack TI, Quadros Elétricos, Alarme, Cofre.

  Saídas:
  • inventario_por_ambiente.csv
  • inventario_totais.csv
  • inventario.json
